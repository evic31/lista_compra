<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Lista de la Compra</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#faf9f5;min-height:100vh;color:#1e1e1e;}
  .app{max-width:500px;margin:0 auto;}

  .header{background:#fff;border-bottom:1px solid #ede9de;padding:18px 20px 0;position:sticky;top:0;z-index:10;box-shadow:0 1px 8px rgba(0,0,0,.05);}
  .header h1{font-size:19px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .tabs{display:flex;overflow-x:auto;scrollbar-width:none;margin-bottom:-1px;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{background:none;border:none;padding:8px 13px;font-size:13px;font-weight:500;color:#999;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
  .tab-btn.active{font-weight:700;}

  .content{padding:16px 16px 60px;}
  .card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #ede9de;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .card-label{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;}

  .input{width:100%;border:1.5px solid #e4dfd2;border-radius:9px;padding:10px 13px;font-size:14px;background:#faf9f5;outline:none;color:#1e1e1e;font-family:inherit;}
  .input:focus{border-color:#c8a825;}
  .input-otros{border-color:#c2b5f0;background:#f5f3fd;}

  .search-wrap{position:relative;margin-bottom:10px;}
  .search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#bbb;font-size:15px;pointer-events:none;}
  .search-wrap .input{padding-left:36px;background:#fff;}

  .supers-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
  .super-chip{display:flex;align-items:center;gap:6px;border:1.5px solid #e0dbd0;border-radius:9px;padding:7px 12px;background:#faf9f5;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;color:#999;user-select:none;}
  .chip-box{width:14px;height:14px;border-radius:4px;border:1.5px solid #ccc;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .chip-check{color:#fff;font-size:10px;line-height:1;}

  .btn{border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;color:#fff;font-family:inherit;transition:background .15s;}
  .btn-gold{background:#c8a825;width:100%;padding:11px;}
  .btn-gold:disabled{background:#e0dbd0;cursor:not-allowed;}

  .backup-bar{display:flex;gap:8px;margin-bottom:14px;}
  .btn-backup{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;border:1.5px solid #e4dfd2;border-radius:10px;padding:10px;font-size:13px;font-weight:600;color:#555;cursor:pointer;font-family:inherit;}

  /* Catálogo row */
  .prod-row{background:#fff;border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:10px;border:1px solid #ede9de;box-shadow:0 1px 3px rgba(0,0,0,.03);margin-bottom:7px;}
  .badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
  .badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid;}
  .btn-del{background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;}

  /* Super header */
  .super-header{border-radius:14px;padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;border:1.5px solid;}
  .super-title{font-size:17px;font-weight:800;}
  .super-sub{font-size:12px;opacity:.75;margin-top:3px;}
  .progress-track{height:4px;background:rgba(0,0,0,.08);border-radius:4px;width:140px;margin-top:8px;}
  .progress-bar{height:100%;border-radius:4px;transition:width .3s;}
  .btn-clear{border:none;border-radius:9px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;color:#fff;font-family:inherit;}

  /* Shopping rows — en lista */
  .shop-row{background:#fff;border-radius:11px;padding:13px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.03);margin-bottom:7px;border:1px solid;}
  .shop-row.done{background:#f7f6f2;box-shadow:none;border-color:#e8e4da !important;}
  .chk-box{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:2px solid #ddd;background:transparent;display:flex;align-items:center;justify-content:center;}
  .chk-mark{color:#fff;font-size:13px;line-height:1;}
  .shop-name{font-size:14px;font-weight:500;flex:1;}
  .shop-name.done{color:#aaa;text-decoration:line-through;}
  .btn-remove{background:none;border:none;color:#ddd;font-size:18px;cursor:pointer;padding:0 0 0 6px;line-height:1;flex-shrink:0;}

  /* Catálogo picker en super tab */
  .section-title{font-size:11px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px;}
  .catalog-row{background:#fff;border-radius:11px;padding:11px 14px;display:flex;align-items:center;gap:12px;border:1px solid #ede9de;margin-bottom:6px;cursor:pointer;transition:all .15s;}
  .catalog-row:active{background:#f5f5f0;}
  .plus-circle{width:24px;height:24px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#bbb;line-height:1;}
  .catalog-name{font-size:14px;color:#777;flex:1;}

  .divider{font-size:11px;color:#bbb;text-align:center;margin:4px 0 11px;text-transform:uppercase;letter-spacing:.5px;}
  .empty{text-align:center;padding:40px 20px;color:#ccc;font-size:14px;line-height:1.8;}
  .count{font-size:12px;color:#bbb;padding-left:2px;margin-bottom:8px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🛒 Lista de la Compra</h1>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="content" id="content"></div>
</div>
<script>
const SUPERS = ["Caprabo","BonArea","Día","Mercadona","Otros"];
const TABS   = ["Productos",...SUPERS];
const EMOJI  = {Caprabo:"🔵",BonArea:"🟠",Día:"🔴",Mercadona:"🟢",Otros:"🟣"};
const C = {
  Caprabo:  {bg:"#e8f0fa",text:"#004B9E",dot:"#004B9E",border:"#b3ccee"},
  BonArea:  {bg:"#fff0e0",text:"#c45e00",dot:"#E87722",border:"#f5c990"},
  Día:      {bg:"#fde8e8",text:"#b50012",dot:"#E30016",border:"#f5aaaa"},
  Mercadona:{bg:"#e6f4ed",text:"#005828",dot:"#007A37",border:"#9dcfb4"},
  Otros:    {bg:"#ede9fb",text:"#4a35a0",dot:"#6c52d9",border:"#c2b5f0"},
};

// productos: [{id, name, supers[], otrosText}]
// listed:    {id: true}  → producto añadido a la lista de esta semana
// checked:   {id: true}  → producto ya metido en el carrito
let state = {
  tab:"Productos",
  productos:[],
  listed:{},   // en la lista de la compra activa
  checked:{},  // marcado como cogido
  newName:"", newSupers:{}, newOtros:"",
  search:""
};

function save(){
  localStorage.setItem("lc-v2-prods",   JSON.stringify(state.productos));
  localStorage.setItem("lc-v2-listed",  JSON.stringify(state.listed));
  localStorage.setItem("lc-v2-checked", JSON.stringify(state.checked));
}
function load(){
  try{ state.productos = JSON.parse(localStorage.getItem("lc-v2-prods")||"[]"); }catch{}
  try{ state.listed    = JSON.parse(localStorage.getItem("lc-v2-listed")||"{}"); }catch{}
  try{ state.checked   = JSON.parse(localStorage.getItem("lc-v2-checked")||"{}"); }catch{}
  // migración desde versión anterior
  if(!state.productos.length){
    try{
      const old = JSON.parse(localStorage.getItem("lc-productos2")||"[]");
      if(old.length){ state.productos = old; save(); }
    }catch{}
  }
}

/* ── RENDER ── */
function render(){ renderTabs(); renderContent(); }

function renderTabs(){
  document.getElementById("tabs").innerHTML = TABS.map(t=>{
    const col = t==="Productos"?"#c8a825":C[t].dot;
    const act = state.tab===t;
    // badge con número de items en lista para supers
    let badge = "";
    if(t!=="Productos"){
      const n = state.productos.filter(p=>p.supers.includes(t)&&state.listed[p.id]&&!state.checked[p.id]).length;
      if(n) badge = ` <span style="background:${C[t].dot};color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700">${n}</span>`;
    }
    return `<button class="tab-btn${act?" active":""}" style="color:${act?col:"#999"};border-bottom-color:${act?col:"transparent"}" onclick="setTab('${t}')">${t}${badge}</button>`;
  }).join("");
}

function renderContent(){
  document.getElementById("content").innerHTML =
    state.tab==="Productos" ? tplProductos() : tplSuper(state.tab);
}

/* ── PESTAÑA PRODUCTOS (catálogo) ── */
function tplProductos(){
  const chips = SUPERS.map(s=>{
    const a = !!state.newSupers[s];
    return `<div class="super-chip${a?"":" "}" style="${a?`border-color:${C[s].dot};background:${C[s].bg};color:${C[s].text}`:""}" onclick="toggleChip('${s}')">
      <div class="chip-box" style="${a?`background:${C[s].dot};border:none`:""}">
        ${a?`<span class="chip-check">✓</span>`:""}
      </div>
      ${EMOJI[s]} ${s}</div>`;
  }).join("");

  const otrosField = state.newSupers["Otros"]
    ? `<input id="inp-otros" class="input input-otros" placeholder="¿Cuál? (Eroski, Lidl…)" value="${esc(state.newOtros)}" oninput="state.newOtros=this.value" style="margin-bottom:12px;">`
    : "";

  const filtered = state.productos
    .filter(p=>p.name.toLowerCase().includes(state.search.toLowerCase()))
    .sort((a,b)=>a.name.localeCompare(b.name));

  const rows = filtered.length===0
    ? `<div class="empty">${state.productos.length===0?"Añade tus productos habituales 👆":"Sin resultados"}</div>`
    : filtered.map(p=>{
        const bs = p.supers.map(s=>{
          const lbl = s==="Otros"&&p.otrosText?`Otros: ${p.otrosText}`:s;
          return `<span class="badge" style="background:${C[s].bg};color:${C[s].text};border-color:${C[s].border}">${lbl}</span>`;
        }).join("");
        return `<div class="prod-row">
          <span style="font-size:17px;flex-shrink:0">🏷️</span>
          <div style="flex:1;min-width:0">
            <span style="font-size:14px;font-weight:500">${esc(p.name)}</span>
            <div class="badges">${bs}</div>
          </div>
          <button class="btn-del" onclick="delProd(${p.id})">×</button>
        </div>`;
      }).join("");

  return `
    <div class="backup-bar">
      <button class="btn-backup" onclick="exportB()">⬇️ Exportar backup</button>
      <label class="btn-backup">⬆️ Importar backup<input type="file" accept=".json" style="display:none" onchange="importB(event)"></label>
    </div>
    <div class="card">
      <div class="card-label">Añadir al catálogo</div>
      <input class="input" id="inp-name" placeholder="Nombre del producto…" value="${esc(state.newName)}"
        oninput="state.newName=this.value"
        onkeydown="if(event.key==='Enter')addProd()"
        style="margin-bottom:12px;">
      <div style="font-size:12px;color:#aaa;margin-bottom:8px;">¿Dónde se compra?</div>
      <div class="supers-grid">${chips}</div>
      ${otrosField}
      <button class="btn btn-gold" onclick="addProd()">+ Añadir al catálogo</button>
    </div>
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input class="input" placeholder="Buscar en catálogo…" value="${esc(state.search)}" oninput="state.search=this.value;renderContent()">
    </div>
    <div class="count">${filtered.length} ${filtered.length===1?"producto":"productos"} en el catálogo</div>
    ${rows}`;
}

/* ── PESTAÑA SUPER ── */
function tplSuper(name){
  const col = C[name];
  // todos los productos del catálogo de este super
  const all     = state.productos.filter(p=>p.supers.includes(name));
  const inList  = all.filter(p=> state.listed[p.id]);
  const notList = all.filter(p=>!state.listed[p.id]);
  const pending = inList.filter(p=>!state.checked[p.id]);
  const done    = inList.filter(p=> state.checked[p.id]);
  const pct     = inList.length ? (done.length/inList.length*100) : 0;

  const clearBtn = done.length
    ? `<button class="btn-clear" style="background:${col.dot}" onclick="clearSuper('${name}')">Limpiar ✓</button>` : "";

  const shopRow = (p, isDone) => {
    const lbl = name==="Otros"&&p.otrosText?`${esc(p.name)} · ${esc(p.otrosText)}`:esc(p.name);
    return `<div class="shop-row${isDone?" done":""}" style="border-color:${isDone?"#e8e4da":col.border}" onclick="toggleCheck(${p.id})">
      <div class="chk-box" style="${isDone?`background:${col.dot};border:none`:""}">
        ${isDone?`<span class="chk-mark">✓</span>`:""}
      </div>
      <span class="shop-name${isDone?" done":""}">${lbl}</span>
      <button class="btn-remove" title="Quitar de la lista" onclick="event.stopPropagation();removeListed(${p.id})">−</button>
    </div>`;
  };

  const catalogRow = p => {
    const lbl = name==="Otros"&&p.otrosText?`${esc(p.name)} · ${esc(p.otrosText)}`:esc(p.name);
    return `<div class="catalog-row" onclick="addListed(${p.id})">
      <div class="plus-circle">+</div>
      <span class="catalog-name">${lbl}</span>
    </div>`;
  };

  const listaSection = inList.length===0
    ? `<div class="empty" style="padding:24px 20px">Toca un producto de abajo para añadirlo a la lista 👇</div>`
    : pending.map(p=>shopRow(p,false)).join("")
      + (done.length&&pending.length?`<div class="divider">— en el carrito —</div>`:"")
      + done.map(p=>shopRow(p,true)).join("");

  const catalogSection = notList.length===0 ? "" : `
    <div class="section-title">📦 Catálogo — toca para añadir a la lista</div>
    ${notList.map(catalogRow).join("")}`;

  return `
    <div class="super-header" style="background:${col.bg};border-color:${col.border}">
      <div>
        <div class="super-title" style="color:${col.text}">${EMOJI[name]} ${name}</div>
        <div class="super-sub" style="color:${col.text}">${pending.length} pendiente${pending.length!==1?"s":""} · ${done.length} en el carrito</div>
        ${inList.length?`<div class="progress-track"><div class="progress-bar" style="width:${pct}%;background:${col.dot}"></div></div>`:""}
      </div>
      ${clearBtn}
    </div>
    ${all.length===0
      ? `<div class="empty">No hay productos de ${name} en el catálogo.<br><span style="font-size:12px">Añádelos desde la pestaña Productos.</span></div>`
      : listaSection + catalogSection}`;
}

/* ── ACCIONES ── */
function setTab(t){ state.tab=t; render(); }

function toggleChip(s){
  state.newSupers[s]=!state.newSupers[s];
  if(!state.newSupers["Otros"]) state.newOtros="";
  renderContent();
}

function addProd(){
  const name = state.newName.trim();
  const supers = SUPERS.filter(s=>state.newSupers[s]);
  if(!name||!supers.length) return;
  state.productos.push({id:Date.now(),name,supers,otrosText:state.newSupers["Otros"]?state.newOtros.trim():""});
  state.newName=""; state.newSupers={}; state.newOtros="";
  save(); renderContent();
}

function delProd(id){
  state.productos=state.productos.filter(p=>p.id!==id);
  delete state.listed[id]; delete state.checked[id];
  save(); renderContent();
}

function addListed(id){
  state.listed[id]=true;
  delete state.checked[id];
  save(); renderContent();
}

function removeListed(id){
  delete state.listed[id]; delete state.checked[id];
  save(); renderContent();
}

function toggleCheck(id){
  state.checked[id]=!state.checked[id];
  save(); renderContent();
}

function clearSuper(name){
  state.productos.filter(p=>p.supers.includes(name)&&state.listed[p.id]).forEach(p=>{
    delete state.listed[p.id]; delete state.checked[p.id];
  });
  save(); renderContent();
}

/* ── BACKUP ── */
function exportB(){
  const d = JSON.stringify({productos:state.productos,exportedAt:new Date().toISOString()},null,2);
  const a = document.createElement("a");
  a.href="data:application/json;charset=utf-8,"+encodeURIComponent(d);
  a.download=`lista-compra-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importB(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      const imp=p.productos||p;
      if(!Array.isArray(imp)) throw 0;
      if(confirm(`¿Importar ${imp.length} productos? Se reemplazará el catálogo actual.`)){
        state.productos=imp; save(); renderContent();
      }
    }catch{ alert("Archivo no válido."); }
  };
  r.readAsText(f); e.target.value="";
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

load(); render();
</script>
</body>
</html>
