<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Lista de la Compra</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#faf9f5;min-height:100vh;color:#1e1e1e;}
  .app{max-width:500px;margin:0 auto;}

  /* HEADER */
  .header{background:#fff;border-bottom:1px solid #ede9de;padding:18px 20px 0;position:sticky;top:0;z-index:10;box-shadow:0 1px 8px rgba(0,0,0,.05);}
  .header h1{font-size:19px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .tabs{display:flex;overflow-x:auto;scrollbar-width:none;margin-bottom:-1px;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{background:none;border:none;padding:8px 13px;font-size:13px;font-weight:500;color:#999;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
  .tab-btn.active{font-weight:700;}

  /* CONTENT */
  .content{padding:16px 16px 60px;}

  /* CARDS */
  .card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #ede9de;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .card-label{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;}

  /* INPUTS */
  .input{width:100%;border:1.5px solid #e4dfd2;border-radius:9px;padding:10px 13px;font-size:14px;background:#faf9f5;outline:none;color:#1e1e1e;font-family:inherit;}
  .input:focus{border-color:#c8a825;}
  .input-otros{border-color:#c2b5f0;background:#f5f3fd;}
  .input-otros:focus{border-color:#6c52d9;}

  /* SEARCH */
  .search-wrap{position:relative;margin-bottom:10px;}
  .search-wrap .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#bbb;font-size:15px;pointer-events:none;}
  .search-wrap .input{padding-left:36px;background:#fff;}

  /* CHECKBOXES SUPERS */
  .supers-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
  .super-chip{display:flex;align-items:center;gap:6px;border:1.5px solid #e0dbd0;border-radius:9px;padding:7px 12px;background:#faf9f5;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;color:#999;user-select:none;}
  .super-chip.active{font-weight:700;}
  .chip-box{width:14px;height:14px;border-radius:4px;border:1.5px solid #ccc;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
  .chip-box.checked{border:none;}
  .chip-check{color:#fff;font-size:10px;line-height:1;}

  /* ADD BTN */
  .btn-add{width:100%;border:none;border-radius:10px;padding:11px;font-weight:700;font-size:14px;cursor:pointer;transition:background .15s;color:#fff;font-family:inherit;}
  .btn-add:disabled{background:#e0dbd0 !important;cursor:not-allowed;}

  /* BACKUP BAR */
  .backup-bar{display:flex;gap:8px;margin-bottom:14px;}
  .btn-backup{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;border:1.5px solid #e4dfd2;border-radius:10px;padding:10px;font-size:13px;font-weight:600;color:#555;cursor:pointer;font-family:inherit;}
  .btn-backup:active{background:#f5f2ea;}

  /* PRODUCT ROWS */
  .prod-row{background:#fff;border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:10px;border:1px solid #ede9de;box-shadow:0 1px 3px rgba(0,0,0,.03);margin-bottom:7px;}
  .prod-name{flex:1;font-size:14px;font-weight:500;min-width:0;}
  .badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
  .badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid;}
  .btn-del{background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;}

  /* SUPER TAB */
  .super-header{border-radius:14px;padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;border:1.5px solid;}
  .super-title{font-size:17px;font-weight:800;}
  .super-sub{font-size:12px;opacity:.75;margin-top:3px;}
  .progress-track{height:4px;background:rgba(0,0,0,.08);border-radius:4px;width:140px;margin-top:8px;}
  .progress-bar{height:100%;border-radius:4px;transition:width .3s;}
  .btn-clear{border:none;border-radius:9px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;color:#fff;font-family:inherit;}

  /* SHOPPING ROWS */
  .shop-row{background:#fff;border-radius:11px;padding:13px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.03);margin-bottom:7px;}
  .shop-row.done{background:#f7f6f2;box-shadow:none;}
  .chk-box{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:2px solid #ddd;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .chk-box.checked{border:none;}
  .chk-mark{color:#fff;font-size:13px;line-height:1;}
  .shop-name{font-size:14px;font-weight:500;flex:1;}
  .shop-name.done{color:#aaa;text-decoration:line-through;}
  .divider{font-size:11px;color:#bbb;text-align:center;margin:4px 0 11px;text-transform:uppercase;letter-spacing:.5px;}

  .empty{text-align:center;padding:50px 20px;color:#ccc;font-size:14px;line-height:1.8;}
  .count{font-size:12px;color:#bbb;padding-left:2px;margin-bottom:8px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><span>🛒</span> Lista de la Compra</h1>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const SUPERS = ["Caprabo","BonArea","Día","Mercadona","Otros"];
const TABS = ["Productos",...SUPERS];
const EMOJI = {Caprabo:"🔵",BonArea:"🟠",Día:"🔴",Mercadona:"🟢",Otros:"🟣"};
const COLORS = {
  Caprabo:  {bg:"#e8f0fa",text:"#004B9E",dot:"#004B9E",border:"#b3ccee"},
  BonArea:  {bg:"#fff0e0",text:"#c45e00",dot:"#E87722",border:"#f5c990"},
  Día:      {bg:"#fde8e8",text:"#b50012",dot:"#E30016",border:"#f5aaaa"},
  Mercadona:{bg:"#e6f4ed",text:"#005828",dot:"#007A37",border:"#9dcfb4"},
  Otros:    {bg:"#ede9fb",text:"#4a35a0",dot:"#6c52d9",border:"#c2b5f0"},
};

let state = {
  tab: "Productos",
  productos: [],
  checked: {},
  newName: "",
  newSupers: {},
  newOtros: "",
  search: ""
};

// --- STORAGE ---
function save(){
  localStorage.setItem("lc-productos", JSON.stringify(state.productos));
  localStorage.setItem("lc-checked",   JSON.stringify(state.checked));
}
function load(){
  try{ state.productos = JSON.parse(localStorage.getItem("lc-productos")||"[]"); }catch{}
  try{ state.checked   = JSON.parse(localStorage.getItem("lc-checked")||"{}"); }catch{}
}

// --- RENDER ---
function render(){
  renderTabs();
  renderContent();
}

function renderTabs(){
  const el = document.getElementById("tabs");
  el.innerHTML = TABS.map(t => {
    const col = t==="Productos" ? "#c8a825" : COLORS[t].dot;
    const active = state.tab===t;
    return `<button class="tab-btn${active?" active":""}" style="color:${active?col:"#999"};border-bottom-color:${active?col:"transparent"}" onclick="setTab('${t}')">${t}</button>`;
  }).join("");
}

function renderContent(){
  const el = document.getElementById("content");
  el.innerHTML = state.tab==="Productos" ? renderProductos() : renderSuper(state.tab);
}

function renderProductos(){
  const anySelected = SUPERS.some(s => state.newSupers[s]);
  const canAdd = state.newName.trim() && anySelected;

  const filtered = state.productos
    .filter(p => p.name.toLowerCase().includes(state.search.toLowerCase()))
    .sort((a,b) => a.name.localeCompare(b.name));

  const chips = SUPERS.map(s => {
    const a = !!state.newSupers[s];
    const c = COLORS[s];
    return `<div class="super-chip${a?" active":""}" style="${a?`border-color:${c.dot};background:${c.bg};color:${c.text}`:""}}" onclick="toggleChip('${s}')">
      <div class="chip-box${a?" checked":""}" style="${a?`background:${c.dot}`:""}">
        ${a?`<span class="chip-check">✓</span>`:""}
      </div>
      ${EMOJI[s]} ${s}
    </div>`;
  }).join("");

  const otrosField = state.newSupers["Otros"]
    ? `<input class="input input-otros" placeholder="¿Cuál? (Eroski, Lidl…)" value="${esc(state.newOtros)}" oninput="state.newOtros=this.value" style="margin-bottom:12px;">`
    : "";

  const rows = filtered.length===0
    ? `<div class="empty">${state.productos.length===0?"Empieza añadiendo productos 👆":"Sin resultados"}</div>`
    : filtered.map(p => {
        const bs = p.supers.map(s => {
          const c = COLORS[s];
          const lbl = s==="Otros"&&p.otrosText ? `Otros: ${p.otrosText}` : s;
          return `<span class="badge" style="background:${c.bg};color:${c.text};border-color:${c.border}">${lbl}</span>`;
        }).join("");
        return `<div class="prod-row">
          <span style="font-size:17px;flex-shrink:0">🏷️</span>
          <div class="prod-name">
            <span style="font-size:14px;font-weight:500">${esc(p.name)}</span>
            <div class="badges">${bs}</div>
          </div>
          <button class="btn-del" onclick="delProd(${p.id})">×</button>
        </div>`;
      }).join("");

  return `
    <div class="backup-bar">
      <button class="btn-backup" onclick="exportBackup()">⬇️ Exportar backup</button>
      <label class="btn-backup">⬆️ Importar backup<input type="file" accept=".json" style="display:none" onchange="importBackup(event)"></label>
    </div>
    <div class="card">
      <div class="card-label">Añadir producto</div>
      <input class="input" placeholder="Nombre del producto…" value="${esc(state.newName)}"
        oninput="state.newName=this.value;renderContent()"
        onkeydown="if(event.key==='Enter')addProd()"
        style="margin-bottom:12px;">
      <div style="font-size:12px;color:#aaa;margin-bottom:8px;">¿Dónde se compra?</div>
      <div class="supers-grid">${chips}</div>
      ${otrosField}
      <button class="btn-add" style="background:${canAdd?"#c8a825":"#e0dbd0"}" ${canAdd?"":"disabled"} onclick="addProd()">+ Añadir producto</button>
    </div>
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input class="input" placeholder="Buscar producto…" value="${esc(state.search)}" oninput="state.search=this.value;renderContent()">
    </div>
    <div class="count">${filtered.length} ${filtered.length===1?"producto":"productos"}</div>
    ${rows}`;
}

function renderSuper(name){
  const c = COLORS[name];
  const prods = state.productos.filter(p => p.supers.includes(name));
  const pending = prods.filter(p => !state.checked[p.id]);
  const done    = prods.filter(p =>  state.checked[p.id]);
  const pct = prods.length ? (done.length/prods.length*100) : 0;

  const clearBtn = done.length
    ? `<button class="btn-clear" style="background:${c.dot}" onclick="clearSuper('${name}')">Limpiar ✓</button>` : "";

  const row = (p, isDone) => {
    const label = name==="Otros"&&p.otrosText ? `${esc(p.name)} · ${esc(p.otrosText)}` : esc(p.name);
    return `<div class="shop-row${isDone?" done":""}" style="border-color:${isDone?"#e8e4da":c.border}" onclick="toggleCheck(${p.id})">
      <div class="chk-box${isDone?" checked":""}" style="${isDone?`background:${c.dot}`:""}">
        ${isDone?`<span class="chk-mark">✓</span>`:""}
      </div>
      <span class="shop-name${isDone?" done":""}">${label}</span>
    </div>`;
  };

  const empty = `<div class="empty">No hay productos asignados a ${name}.<br><span style="font-size:12px">Añádelos desde la pestaña Productos.</span></div>`;
  const divider = (pending.length&&done.length) ? `<div class="divider">— en el carrito —</div>` : "";

  return `
    <div class="super-header" style="background:${c.bg};border-color:${c.border}">
      <div>
        <div class="super-title" style="color:${c.text}">${EMOJI[name]} ${name}</div>
        <div class="super-sub" style="color:${c.text}">${done.length} de ${prods.length} en el carrito</div>
        ${prods.length ? `<div class="progress-track"><div class="progress-bar" style="width:${pct}%;background:${c.dot}"></div></div>` : ""}
      </div>
      ${clearBtn}
    </div>
    ${prods.length===0 ? empty : pending.map(p=>row(p,false)).join("")+divider+done.map(p=>row(p,true)).join("")}`;
}

// --- ACTIONS ---
function setTab(t){ state.tab=t; render(); }

function toggleChip(s){
  state.newSupers[s] = !state.newSupers[s];
  if(!state.newSupers["Otros"]) state.newOtros="";
  renderContent();
}

function addProd(){
  const name = state.newName.trim();
  const supers = SUPERS.filter(s => state.newSupers[s]);
  if(!name||!supers.length) return;
  state.productos.push({
    id: Date.now(),
    name,
    supers,
    otrosText: state.newSupers["Otros"] ? state.newOtros.trim() : ""
  });
  state.newName=""; state.newSupers={}; state.newOtros="";
  save(); renderContent();
}

function delProd(id){
  state.productos = state.productos.filter(p=>p.id!==id);
  delete state.checked[id];
  save(); renderContent();
}

function toggleCheck(id){
  state.checked[id] = !state.checked[id];
  save(); renderContent();
}

function clearSuper(name){
  state.productos.filter(p=>p.supers.includes(name)).forEach(p=>delete state.checked[p.id]);
  save(); renderContent();
}

// --- BACKUP ---
function exportBackup(){
  const data = JSON.stringify({productos:state.productos, exportedAt:new Date().toISOString()}, null, 2);
  const a = document.createElement("a");
  a.href = "data:application/json;charset=utf-8,"+encodeURIComponent(data);
  a.download = `lista-compra-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importBackup(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const parsed = JSON.parse(ev.target.result);
      const imported = parsed.productos || parsed;
      if(!Array.isArray(imported)) throw 0;
      if(confirm(`¿Importar ${imported.length} productos? Se reemplazará la lista actual.`)){
        state.productos = imported;
        save(); renderContent();
      }
    }catch{ alert("Archivo no válido."); }
  };
  reader.readAsText(file);
  e.target.value="";
}

// --- UTILS ---
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// --- INIT ---
load(); render();
</script>
</body>
</html>
